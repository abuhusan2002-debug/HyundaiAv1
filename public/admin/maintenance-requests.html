<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلبات الصيانة | Hyundai Syria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-badge">HYUNDAI</span>
        <div>
          <h1>نظام مدير ما بعد البيع</h1>
          <p>شركة هيونداي - سوريا</p>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-outline" type="button">تسجيل الخروج</button>
    </header>

    <nav class="main-nav">
      <a data-nav href="/admin/dashboard">الرئيسية</a>
      <a data-nav href="/admin/customers">حسابات العملاء</a>
      <a data-nav href="/admin/customer-cars">سيارات العملاء</a>
      <a data-nav href="/admin/showroom-cars">سيارات المعرض</a>
      <a data-nav href="/admin/technicians">الفنيون</a>
      <a data-nav href="/admin/maintenance-requests">طلبات الصيانة</a>
      <a data-nav href="/admin/spare-parts">قطع الغيار</a>
    </nav>

    <main class="page-container">
      <div id="flashMessage" class="flash flash-error" style="display: none"></div>

      <section class="page-head maintenance-head">
        <div>
          <h2>طلبات الصيانة</h2>
          <p>راجع طلبات العملاء، ثم اقبل الطلب مع تحديد موعد أو ارفضه مع ذكر السبب.</p>
        </div>
        <div class="maintenance-head-actions">
          <button id="openAdminMaintenanceArchiveBtn" class="btn maintenance-archive-btn" type="button">
            أرشيف الطلبات
          </button>
        </div>
      </section>

      <section id="adminMaintenanceRequestsList" class="maintenance-list admin-maintenance-list"></section>

      <section id="adminMaintenanceArchiveModal" class="modal-backdrop" style="display: none">
        <div class="modal-card maintenance-archive-modal">
          <div class="maintenance-archive-head">
            <h3>أرشيف طلبات الصيانة</h3>
            <button id="closeAdminMaintenanceArchiveBtn" class="btn" type="button">إغلاق</button>
          </div>
          <section id="adminMaintenanceArchiveList" class="maintenance-list maintenance-archive-list"></section>
        </div>
      </section>
    </main>

    <div id="maintenanceReviewModal" class="modal-backdrop" style="display: none">
      <div class="modal-card">
        <h3 id="reviewModalTitle">مراجعة طلب الصيانة</h3>
        <form id="maintenanceReviewForm">
          <input id="reviewRequestId" type="hidden" />
          <div class="form-group">
            <label>القرار</label>
            <select id="reviewDecision" name="decision" required>
              <option value="مقبول">مقبول</option>
              <option value="مرفوض">مرفوض</option>
            </select>
          </div>
          <div id="appointmentWrap" class="form-group">
            <label>موعد العميل</label>
            <input id="reviewAppointmentDate" name="appointmentDate" type="date" />
          </div>
          <div id="rejectionWrap" class="form-group" style="display: none">
            <label>سبب الرفض</label>
            <textarea id="reviewRejectionReason" name="rejectionReason" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>ملاحظة المدير (اختياري)</label>
            <textarea id="reviewAdminNote" name="adminNote" rows="2"></textarea>
          </div>
          <div class="actions-row">
            <button class="btn btn-primary" type="submit">حفظ القرار</button>
            <button id="closeReviewModalBtn" class="btn" type="button">إلغاء</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/app-common.js"></script>
    <script src="/js/pages/maintenance-requests.js"></script>
  </body>
</html>
